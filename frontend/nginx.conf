server {
    listen 80;
    server_name _;

    # Fichiers statiques de l'application (SPA)
    root /usr/share/nginx/html;
    index index.html;

    # Proxy des appels API vers le service backend (réseau docker-compose)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Routage côté client : tout le reste retombe sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
